<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物車｜My Store</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft JhengHei",Arial,sans-serif}
        body{background:linear-gradient(180deg,#f7f9ff 0%,#eef3fb 100%);color:#1f2937}
        a{text-decoration:none;color:inherit}
        .container{width:min(1280px,92%);margin:auto}
        .topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e5e7eb}
        .topbar-inner{min-height:78px;display:flex;justify-content:center;align-items:center;position:relative}
        .logo{font-size:1.4rem;font-weight:800;display:flex;gap:12px;align-items:center;position:absolute;left:0;top:50%;transform:translateY(-50%)}
        .logo-badge{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#1d4ed8,#60a5fa);color:#fff;display:grid;place-items:center}
        .nav-links{display:flex;justify-content:center;align-items:center;gap:28px;flex-wrap:wrap}
        .nav-links a{padding:0;border-radius:0;background:none;color:#6b7280;font-weight:700;position:relative}
        .nav-links a.active,.nav-links a:hover{color:#1d4ed8}
        .nav-links a::after{content:"";position:absolute;left:0;bottom:-6px;width:0;height:2px;background:#1d4ed8;transition:.2s}
        .nav-links a.active::after,.nav-links a:hover::after{width:100%}
        .btn{display:inline-block;border:none;border-radius:14px;padding:12px 18px;font-weight:800;cursor:pointer}
        .btn-primary{background:#1d4ed8;color:#fff}
        .btn-light{background:#fff;border:1px solid #d1d5db}
        .btn-danger{background:#fee2e2;color:#b91c1c}
        .panel-page{padding:40px 0}
        .cart-layout{display:grid;grid-template-columns:1.3fr .7fr;gap:28px}
        .card{background:#fff;border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 12px 35px rgba(15,23,42,.08);padding:28px}
        .card-header h2,.card-header h3{margin-bottom:8px}
        .card-header p{color:#6b7280;line-height:1.7;margin-bottom:18px}
        .cart-item{display:grid;grid-template-columns:140px 1fr auto;gap:18px;padding:18px 0;border-bottom:1px solid #e5e7eb}
        .cart-item:last-child{border-bottom:none}
        .cart-item-image{height:120px;border-radius:18px;overflow:hidden}
        .cart-item-image img{width:100%;height:100%;object-fit:cover;display:block}
        .cart-item-info h3{margin-bottom:10px}
        .cart-item-info p{color:#6b7280;line-height:1.7;margin-bottom:12px}
        .qty-box{display:inline-flex;gap:12px;align-items:center;background:#f3f4f6;padding:8px 14px;border-radius:999px;font-weight:800}
        .item-side{display:flex;flex-direction:column;align-items:end;justify-content:space-between;gap:12px}
        .summary-line{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed #d1d5db}
        .summary-line.total{font-size:1.15rem;font-weight:800;border-bottom:none;padding-top:20px}
        @media (max-width:900px){
            .cart-layout{grid-template-columns:1fr}
            .cart-item{grid-template-columns:1fr}
            .item-side{align-items:start}
        }
            @media (max-width:900px){.topbar-inner{flex-direction:column;padding:14px 0;gap:14px}.logo{position:static;transform:none}}
            @media (max-width:768px){.nav-links{gap:18px}}
    </style>
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <div class="logo"><div class="logo-badge">購</div><span>My Store</span></div>
            <nav class="nav-links">
                <a href="index.html">主頁</a>
                <a href="member.html">會員中心</a>
                <a href="cart.html" class="active">購物車</a>
            </nav>
        </div>
    </header>

    <main class="panel-page">
        <div class="container cart-layout">
            <section class="card">
                <div class="card-header">
                    <h2>我的購物車</h2>
                    <p>真正的購買整理都集中在這裡。商品卡只加購物車，流程才不會亂飛。</p>
                </div>

                <article class="cart-item">
                    <div class="cart-item-image">
                        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=900&q=80" alt="商品圖">
                    </div>
                    <div class="cart-item-info">
                        <h3>極簡風智慧手錶</h3>
                        <p>商品規格、顏色、庫存狀態，之後都可以讓後端資料吐進來。</p>
                        <div class="qty-box">數量：1</div>
                    </div>
                    <div class="item-side">
                        <strong>NT$ 2,980</strong>
                        <button class="btn btn-danger">移除</button>
                    </div>
                </article>

                <article class="cart-item">
                    <div class="cart-item-image">
                        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80" alt="商品圖">
                    </div>
                    <div class="cart-item-info">
                        <h3>城市機能運動鞋</h3>
                        <p>購物車頁適合放數量、價格、折扣、刪除、規格資訊。該待在這裡的東西就不要跑去首頁吵。</p>
                        <div class="qty-box">數量：2</div>
                    </div>
                    <div class="item-side">
                        <strong>NT$ 7,360</strong>
                        <button class="btn btn-danger">移除</button>
                    </div>
                </article>
            </section>

            <aside class="card">
                <div class="card-header">
                    <h3>結帳摘要</h3>
                    <p>這塊就是導向付款頁的核心。</p>
                </div>

                <div class="summary-line"><span>商品小計</span><span>NT$ 10,340</span></div>
                <div class="summary-line"><span>運費</span><span>NT$ 60</span></div>
                <div class="summary-line"><span>折扣</span><span>- NT$ 200</span></div>
                <div class="summary-line total"><span>總計</span><span>NT$ 10,200</span></div>

                <div style="margin-top:24px">
                    <a href="checkout.html" class="btn btn-primary" style="width:100%;text-align:center">前往付款</a>
                </div>
            </aside>
        </div>
    </main>
</body>
</html>
