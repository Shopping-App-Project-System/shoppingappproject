<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊｜My Store</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft JhengHei",Arial,sans-serif}
        body{background:linear-gradient(180deg,#f7f9ff 0%,#eef3fb 100%);color:#1f2937}
        a{text-decoration:none;color:inherit}
        .container{width:min(1180px,92%);margin:auto}
        .topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e5e7eb}
        .topbar-inner{min-height:78px;display:flex;justify-content:center;align-items:center;position:relative}
        .logo{font-size:1.4rem;font-weight:800;display:flex;gap:12px;align-items:center;position:absolute;left:0;top:50%;transform:translateY(-50%)}
        .logo-badge{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#1d4ed8,#60a5fa);color:#fff;display:grid;place-items:center}
        .nav-links{display:flex;justify-content:center;align-items:center;gap:28px;flex-wrap:wrap}
        .nav-links a{padding:0;border-radius:0;background:none;color:#6b7280;font-weight:700;position:relative}
        .nav-links a::after{content:"";position:absolute;left:0;bottom:-6px;width:0;height:2px;background:#1d4ed8;transition:.2s}
        .nav-links a.active,.nav-links a:hover{color:#1d4ed8}
        .nav-links a.active::after,.nav-links a:hover::after{width:100%}
        .btn{display:inline-block;border:none;border-radius:14px;padding:12px 18px;font-weight:800;cursor:pointer}
        .btn-primary{background:#1d4ed8;color:#fff}
        .btn-light{background:#fff;border:1px solid #d1d5db}
        .auth-layout{min-height:calc(100vh - 78px);display:grid;place-items:center;padding:40px 0}
        .auth-card{width:min(1080px,95%);display:grid;grid-template-columns:1fr .95fr;background:#fff;border:1px solid #e5e7eb;border-radius:28px;overflow:hidden;box-shadow:0 20px 45px rgba(15,23,42,.1)}
        .auth-visual{padding:42px;background:linear-gradient(135deg,rgba(15,23,42,.8),rgba(29,78,216,.65)),url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1200&q=80') center/cover;color:#fff;display:flex;flex-direction:column;justify-content:end}
        .auth-visual h2{font-size:2.2rem;margin-bottom:12px}
        .auth-visual p{line-height:1.8;color:rgba(255,255,255,.9)}
        .auth-form-wrap{padding:38px}
        .card-header h1{margin-bottom:10px}
        .card-header p{color:#6b7280;line-height:1.7;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
        .form-group{display:flex;flex-direction:column;gap:8px}
        .full{grid-column:1/-1}
        .form-group label{font-weight:800}
        .form-group input{border:1px solid #d1d5db;background:#f9fafb;border-radius:14px;padding:14px}
        .form-footer{display:flex;justify-content:flex-end;gap:12px;margin-top:20px;flex-wrap:wrap}
        @media (max-width:900px){.topbar-inner{flex-direction:column;padding:14px 0;gap:14px}.logo{position:static;transform:none}.auth-card,.form-grid{grid-template-columns:1fr}}
            @media (max-width:768px){.nav-links{gap:18px}}
    </style>
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <div class="logo"><div class="logo-badge">購</div><span>My Store</span></div>
            <nav class="nav-links">
                <a href="index.html">主頁</a>
                <a href="member.html">會員中心</a>
                <a href="cart.html">購物車</a>
            </nav>
        </div>
    </header>

    <main class="auth-layout">
        <div class="auth-card">
            <section class="auth-visual">
                <h2>建立會員帳號</h2>
                <p>這頁先給你完整操作版面。後面你要接驗證、JWT、Session、信箱驗證，再往上疊就行。</p>
            </section>

            <section class="auth-form-wrap">
                <div class="card-header">
                    <h1>會員註冊</h1>
                    <p>填寫基本資料完成註冊流程。</p>
                </div>

                <form>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>姓名</label>
                            <input type="text" placeholder="請輸入姓名">
                        </div>
                        <div class="form-group">
                            <label>手機</label>
                            <input type="text" placeholder="請輸入手機號碼">
                        </div>
                        <div class="form-group">
                            <label>帳號</label>
                            <input type="text" placeholder="請輸入帳號">
                        </div>
                        <div class="form-group">
                            <label>信箱</label>
                            <input type="email" placeholder="請輸入電子信箱">
                        </div>
                        <div class="form-group full">
                            <label>密碼</label>
                            <input type="password" placeholder="請輸入密碼">
                        </div>
                    </div>

                    <div class="form-footer">
                        <button type="submit" class="btn btn-primary">送出註冊</button>
                    </div>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
