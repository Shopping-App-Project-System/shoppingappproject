<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>註冊｜{{ store_name or 'My Store' }}</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft JhengHei",Arial}
body{background:linear-gradient(180deg,#f7f9ff,#eef3fb)}

.container{width:min(1100px,92%);margin:auto}

.topbar{background:#fff;border-bottom:1px solid #e5e7eb}
.topbar-inner{min-height:70px;display:flex;align-items:center;justify-content:center;position:relative}
.logo{position:absolute;left:0;font-weight:800}

.nav-links{display:flex;gap:25px}
.nav-links a{color:#6b7280;font-weight:700}

.auth-layout{
    min-height:calc(100vh - 70px);
    display:grid;
    place-items:center;
}

.auth-card{
    display:grid;
    grid-template-columns:1fr 1fr;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.auth-visual{
    padding:40px;
    background:linear-gradient(135deg,#1d4ed8,#60a5fa);
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:end;
}

.auth-form{
    padding:40px;
}

.form-group{
    margin-bottom:15px;
    display:flex;
    flex-direction:column;
}

.form-group input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
}

.btn{
    background:#1d4ed8;
    color:#fff;
    padding:12px;
    border-radius:10px;
    font-weight:700;
}

.flash{
    margin-bottom:15px;
    padding:10px;
    background:#fee2e2;
    color:#b91c1c;
    border-radius:10px;
}

@media(max-width:800px){
    .auth-card{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header class="topbar">
<div class="container topbar-inner">

<div class="logo">{{ store_name or 'My Store' }}</div>

<nav class="nav-links">
<a href="{{ home_url or 'index.html' }}">主頁</a>
<a href="{{ member_url or 'member.html' }}">會員中心</a>
<a href="{{ cart_url or 'cart.html' }}">購物車</a>
</nav>

</div>
</header>

<main class="auth-layout">

<div class="auth-card">

<div class="auth-visual">
<h2>{{ visual_title or '建立帳號' }}</h2>
<p>{{ visual_text or '註冊後即可開始購物' }}</p>
</div>

<div class="auth-form">

<h1 style="margin-bottom:10px">會員註冊</h1>
<p style="margin-bottom:20px;color:#6b7280">填寫基本資料</p>

<!-- flash -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="flash">{{ messages[0] }}</div>
{% endif %}
{% endwith %}

<form method="POST" action="{{ submit_url or '/register' }}">

<div class="form-group">
<input type="text" name="name" placeholder="姓名"
value="{{ form.name if form else '' }}">
</div>

<div class="form-group">
<input type="text" name="phone" placeholder="手機"
value="{{ form.phone if form else '' }}">
</div>

<div class="form-group">
<input type="text" name="account" placeholder="帳號"
value="{{ form.account if form else '' }}">
</div>

<div class="form-group">
<input type="email" name="email" placeholder="信箱"
value="{{ form.email if form else '' }}">
</div>

<div class="form-group">
<input type="password" name="password" placeholder="密碼">
</div>

<button type="submit" class="btn">註冊</button>

</form>

</div>

</div>

</main>

</body>
</html>
