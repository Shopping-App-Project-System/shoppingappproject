<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>付款頁｜{{ store_name or 'My Store' }}</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft JhengHei",Arial,sans-serif}
        body{background:linear-gradient(180deg,#f7f9ff 0%,#eef3fb 100%);color:#1f2937}
        a{text-decoration:none;color:inherit}
        .container{width:min(1280px,92%);margin:auto}
        .topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e5e7eb}
        .topbar-inner{min-height:78px;display:flex;justify-content:center;align-items:center;position:relative}
        .logo{font-size:1.4rem;font-weight:800;display:flex;gap:12px;align-items:center;position:absolute;left:0;top:50%;transform:translateY(-50%)}
        .logo-badge{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#1d4ed8,#60a5fa);color:#fff;display:grid;place-items:center}
        .nav-links{display:flex;gap:28px}
        .nav-links a{color:#6b7280;font-weight:700}
        .nav-links a.active,.nav-links a:hover{color:#1d4ed8}

        .panel-page{padding:40px 0}
        .page-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:28px}
        .card{background:#fff;border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 12px 35px rgba(15,23,42,.08);padding:28px}

        .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
        .form-group{display:flex;flex-direction:column;gap:6px}
        .full{grid-column:1/-1}
        .form-group input,.form-group select{
            border:1px solid #d1d5db;
            background:#f9fafb;
            border-radius:14px;
            padding:14px
        }

        .btn{border:none;border-radius:14px;padding:12px 18px;font-weight:800;cursor:pointer}
        .btn-primary{background:#1d4ed8;color:#fff}
        .btn-light{background:#fff;border:1px solid #d1d5db}

        .form-footer{display:flex;justify-content:flex-end;gap:12px;margin-top:20px}

        .summary-line{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed #d1d5db}
        .summary-line.total{font-weight:800;border-bottom:none}

        .empty-state{
            text-align:center;
            padding:40px 0;
            color:#6b7280;
        }

        @media (max-width:900px){.page-grid,.form-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>

<header class="topbar">
    <div class="container topbar-inner">
        <div class="logo">
            <div class="logo-badge">購</div>
            <span>{{ store_name or 'My Store' }}</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">主頁</a>
            <a href="member.html">會員中心</a>
            <a href="cart.html">購物車</a>
        </nav>
    </div>
</header>

<main class="panel-page">
    <div class="container page-grid">

        <!-- 表單 -->
        <section class="card">
            <h2 style="margin-bottom:20px">付款資訊</h2>

            <form method="POST" action="{{ submit_url or '' }}">
                <div class="form-grid">

                    <div class="form-group">
                        <input type="text" name="name" placeholder="姓名"
                               value="{{ form.name if form else '' }}">
                    </div>

                    <div class="form-group">
                        <input type="text" name="phone" placeholder="電話"
                               value="{{ form.phone if form else '' }}">
                    </div>

                    <div class="form-group full">
                        <input type="text" name="address" placeholder="地址"
                               value="{{ form.address if form else '' }}">
                    </div>

                    <div class="form-group">
                        <select name="payment">
                            {% if payment_methods %}
                                {% for p in payment_methods %}
                                <option value="{{ p }}">{{ p }}</option>
                                {% endfor %}
                            {% else %}
                                <option>無付款方式</option>
                            {% endif %}
                        </select>
                    </div>

                    <div class="form-group">
                        <select name="shipping">
                            {% if shipping_methods %}
                                {% for s in shipping_methods %}
                                <option value="{{ s }}">{{ s }}</option>
                                {% endfor %}
                            {% else %}
                                <option>無配送方式</option>
                            {% endif %}
                        </select>
                    </div>

                    <div class="form-group full">
                        <input type="text" name="note" placeholder="備註"
                               value="{{ form.note if form else '' }}">
                    </div>

                </div>

                <div class="form-footer">
                    <a href="cart.html" class="btn btn-light">返回</a>
                    <button type="submit" class="btn btn-primary">確認付款</button>
                </div>
            </form>
        </section>

        <!-- 訂單摘要 -->
        <aside class="card">
            <h3 style="margin-bottom:20px">訂單摘要</h3>

            {% if order_items %}
                {% for item in order_items %}
                <div class="summary-line">
                    <span>{{ item.name }} × {{ item.qty }}</span>
                    <span>NT$ {{ item.price | int }}</span>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">尚無商品</div>
            {% endif %}

            <div class="summary-line">
                <span>運費</span>
                <span>{{ summary.shipping or 0 }}</span>
            </div>

            <div class="summary-line total">
                <span>總計</span>
                <span>{{ summary.total or 0 }}</span>
            </div>
        </aside>

    </div>
</main>

</body>
</html>
